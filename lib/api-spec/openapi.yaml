openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Station Satcom Admin Panel API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: station
    description: Station Satcom operations
  - name: records
    description: CDR records operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /station/settings:
    get:
      operationId: getStationSettings
      tags: [station]
      summary: Get Station Satcom settings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationSettings"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: saveStationSettings
      tags: [station]
      summary: Save Station Satcom settings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveStationSettingsBody"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationSettings"

  /station/test-connection:
    post:
      operationId: testConnection
      tags: [station]
      summary: Test Station Satcom connection
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Connection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestConnectionResponse"

  /station/sync-now:
    post:
      operationId: syncNow
      tags: [station]
      summary: Trigger manual sync
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "409":
          description: Sync already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /station/cdr-records:
    get:
      operationId: getCdrRecords
      tags: [records]
      summary: Get CDR records
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: kitNo
          in: query
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
        - name: customerCode
          in: query
          schema:
            type: string
        - name: product
          in: query
          schema:
            type: string
        - name: service
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [totalVolumeGbNumeric, totalPrice, syncedAt, startCdr]
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: CDR records list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CdrRecordsResponse"

  /station/kits:
    get:
      operationId: getKits
      tags: [records]
      summary: Get KIT summary
      security:
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [totalGb, totalPrice, lastSeen]
      responses:
        "200":
          description: KIT summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitSummary"

  /station/summary:
    get:
      operationId: getDashboardSummary
      tags: [records]
      summary: Get dashboard summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /station/sync-logs:
    get:
      operationId: getSyncLogs
      tags: [records]
      summary: Get sync logs
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Sync logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncLogsResponse"

  /station/export-csv:
    get:
      operationId: exportCsv
      tags: [records]
      summary: Export CDR records as CSV
      security:
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: query
          schema:
            type: string
        - name: period
          in: query
          schema:
            type: string
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AdminUser"
      required:
        - token
        - user

    AdminUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - createdAt

    ChangePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required:
        - currentPassword
        - newPassword

    StationSettings:
      type: object
      properties:
        id:
          type: integer
        portalUrl:
          type: string
        username:
          type: string
        isActive:
          type: boolean
        defaultBillingPeriod:
          type: string
          nullable: true
        syncIntervalMinutes:
          type: integer
        lastSuccessSyncAt:
          type: string
          format: date-time
          nullable: true
        lastErrorMessage:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - portalUrl
        - username
        - isActive
        - syncIntervalMinutes
        - createdAt
        - updatedAt

    SaveStationSettingsBody:
      type: object
      properties:
        portalUrl:
          type: string
        username:
          type: string
        password:
          type: string
          nullable: true
        isActive:
          type: boolean
        defaultBillingPeriod:
          type: string
          nullable: true
        syncIntervalMinutes:
          type: integer
      required:
        - portalUrl
        - username
        - isActive
        - syncIntervalMinutes

    TestConnectionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    SyncResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        recordsFound:
          type: integer
        recordsInserted:
          type: integer
        recordsUpdated:
          type: integer
      required:
        - success
        - message
        - recordsFound
        - recordsInserted
        - recordsUpdated

    CdrRecord:
      type: object
      properties:
        id:
          type: integer
        kitNo:
          type: string
        shipName:
          type: string
          nullable: true
        product:
          type: string
          nullable: true
        service:
          type: string
          nullable: true
        originNumber:
          type: string
          nullable: true
        destinationNumber:
          type: string
          nullable: true
        customerCode:
          type: string
          nullable: true
        totalVolumeData:
          type: string
          nullable: true
        totalVolumeGbNumeric:
          type: number
          nullable: true
        totalVolumeMin:
          type: string
          nullable: true
        totalVolumeMsg:
          type: string
          nullable: true
        currency:
          type: string
          nullable: true
        totalPrice:
          type: string
          nullable: true
        inBundle:
          type: string
          nullable: true
        invoicedAmount:
          type: string
          nullable: true
        period:
          type: string
          nullable: true
        cdrId:
          type: string
          nullable: true
        startCdr:
          type: string
          nullable: true
        endCdr:
          type: string
          nullable: true
        syncedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - kitNo
        - syncedAt
        - createdAt

    CdrRecordsResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: "#/components/schemas/CdrRecord"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - records
        - total
        - page
        - limit
        - totalPages

    KitSummary:
      type: object
      properties:
        kitNo:
          type: string
        shipName:
          type: string
          nullable: true
        totalGb:
          type: number
        totalPrice:
          type: number
        recordCount:
          type: integer
        lastPeriod:
          type: string
          nullable: true
        lastSyncedAt:
          type: string
          format: date-time
          nullable: true
      required:
        - kitNo
        - totalGb
        - totalPrice
        - recordCount

    DashboardSummary:
      type: object
      properties:
        totalKits:
          type: integer
        totalGb:
          type: number
        totalUsd:
          type: number
        activePeriod:
          type: string
          nullable: true
        lastSuccessSyncAt:
          type: string
          format: date-time
          nullable: true
        lastSyncStatus:
          type: string
          nullable: true
        lastSyncError:
          type: string
          nullable: true
        lastSyncRecordsFound:
          type: integer
          nullable: true
        lastSyncRecordsInserted:
          type: integer
          nullable: true
        lastSyncRecordsUpdated:
          type: integer
          nullable: true
      required:
        - totalKits
        - totalGb
        - totalUsd

    SyncLog:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        message:
          type: string
          nullable: true
        recordsFound:
          type: integer
          nullable: true
        recordsInserted:
          type: integer
          nullable: true
        recordsUpdated:
          type: integer
          nullable: true
        screenshotPath:
          type: string
          nullable: true
        htmlSnapshotPath:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - status
        - startedAt
        - createdAt

    SyncLogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/SyncLog"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - logs
        - total
        - page
        - limit
        - totalPages
