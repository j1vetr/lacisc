openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Station Satcom Admin Panel API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: station
  - name: records

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /station/settings:
    get:
      operationId: getStationSettings
      tags: [station]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationSettings"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: saveStationSettings
      tags: [station]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveStationSettingsBody"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationSettings"

  /station/test-connection:
    post:
      operationId: testConnection
      tags: [station]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Connection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestConnectionResponse"

  /station/wipe-data:
    post:
      operationId: wipeStationData
      tags: [station]
      summary: Tüm terminal verilerini siler (CDR, dönem toplamları, KIT listesi, sync logları). Portal kimlik bilgileri korunur.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Wipe result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WipeDataResponse"

  /station/sync-now:
    post:
      operationId: syncNow
      tags: [station]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "409":
          description: Sync already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /station/kits:
    get:
      operationId: getKits
      tags: [records]
      summary: KIT summary list (active period totals)
      security:
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [totalGib, totalUsd, lastSeen]
      responses:
        "200":
          description: KIT summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitSummary"

  /station/kits/{kitNo}:
    get:
      operationId: getKitDetail
      tags: [records]
      security:
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: KIT detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KitDetail"
        "404":
          description: KIT not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /station/kits/{kitNo}/daily:
    get:
      operationId: getKitDaily
      tags: [records]
      summary: Day-by-day CDR rows for a KIT in a period
      security:
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: path
          required: true
          schema: { type: string }
        - name: period
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Daily points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitDailyPoint"

  /station/kits/{kitNo}/monthly:
    get:
      operationId: getKitMonthly
      tags: [records]
      summary: Period totals for a KIT (all months)
      security:
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Monthly totals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitMonthlyPoint"

  /station/summary:
    get:
      operationId: getDashboardSummary
      tags: [records]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /station/sync-logs:
    get:
      operationId: getSyncLogs
      tags: [records]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Sync logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncLogsResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error: { type: string }
      required: [error]

    MessageResponse:
      type: object
      properties:
        message: { type: string }
      required: [message]

    LoginBody:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string }
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token: { type: string }
        user:
          $ref: "#/components/schemas/AdminUser"
      required: [token, user]

    AdminUser:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        createdAt: { type: string, format: date-time }
      required: [id, name, email, createdAt]

    ChangePasswordBody:
      type: object
      properties:
        currentPassword: { type: string }
        newPassword: { type: string }
      required: [currentPassword, newPassword]

    StationSettings:
      type: object
      properties:
        id: { type: integer }
        portalUrl: { type: string }
        username: { type: string }
        isActive: { type: boolean }
        defaultBillingPeriod: { type: string, nullable: true }
        syncIntervalMinutes: { type: integer }
        lastSuccessSyncAt: { type: string, format: date-time, nullable: true }
        lastErrorMessage: { type: string, nullable: true }
        firstFullSyncAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - portalUrl
        - username
        - isActive
        - syncIntervalMinutes
        - createdAt
        - updatedAt

    SaveStationSettingsBody:
      type: object
      properties:
        portalUrl: { type: string }
        username: { type: string }
        password: { type: string, nullable: true }
        isActive: { type: boolean }
        defaultBillingPeriod: { type: string, nullable: true }
        syncIntervalMinutes: { type: integer }
      required: [portalUrl, username, isActive, syncIntervalMinutes]

    TestConnectionResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
      required: [success, message]

    WipeDataResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        deleted:
          type: object
          properties:
            kitDaily: { type: integer }
            kitPeriodTotal: { type: integer }
            kits: { type: integer }
            syncLogs: { type: integer }
          required: [kitDaily, kitPeriodTotal, kits, syncLogs]
      required: [success, message, deleted]

    SyncResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        recordsFound: { type: integer }
        recordsInserted: { type: integer }
        recordsUpdated: { type: integer }
      required: [success, message, recordsFound, recordsInserted, recordsUpdated]

    KitSummary:
      type: object
      properties:
        kitNo: { type: string }
        shipName: { type: string, nullable: true }
        totalGib: { type: number, nullable: true }
        totalUsd: { type: number, nullable: true }
        rowCount: { type: integer }
        lastPeriod: { type: string, nullable: true }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
      required: [kitNo, rowCount]

    KitDetail:
      type: object
      properties:
        kitNo: { type: string }
        shipName: { type: string, nullable: true }
        currentPeriod: { type: string, nullable: true }
        totalGib: { type: number, nullable: true }
        totalUsd: { type: number, nullable: true }
        rowCount: { type: integer }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
      required: [kitNo, rowCount]

    KitDailyPoint:
      type: object
      properties:
        dayDate: { type: string, description: "YYYY-MM-DD" }
        volumeGib: { type: number, nullable: true }
        chargeUsd: { type: number, nullable: true }
        service: { type: string, nullable: true }
        cdrId: { type: string }
      required: [dayDate, cdrId]

    KitMonthlyPoint:
      type: object
      properties:
        period: { type: string }
        totalGib: { type: number, nullable: true }
        totalUsd: { type: number, nullable: true }
        rowCount: { type: integer }
        scrapedAt: { type: string, format: date-time, nullable: true }
      required: [period, rowCount]

    DashboardSummary:
      type: object
      properties:
        totalKits: { type: integer }
        totalGib: { type: number }
        totalUsd: { type: number }
        activePeriod: { type: string, nullable: true }
        lastSuccessSyncAt: { type: string, format: date-time, nullable: true }
        lastSyncStatus: { type: string, nullable: true }
        lastSyncError: { type: string, nullable: true }
        lastSyncRecordsFound: { type: integer, nullable: true }
        lastSyncRecordsInserted: { type: integer, nullable: true }
        lastSyncRecordsUpdated: { type: integer, nullable: true }
      required: [totalKits, totalGib, totalUsd]

    SyncLog:
      type: object
      properties:
        id: { type: integer }
        status: { type: string }
        message: { type: string, nullable: true }
        recordsFound: { type: integer, nullable: true }
        recordsInserted: { type: integer, nullable: true }
        recordsUpdated: { type: integer, nullable: true }
        screenshotPath: { type: string, nullable: true }
        htmlSnapshotPath: { type: string, nullable: true }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, status, startedAt, createdAt]

    SyncLogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/SyncLog"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        totalPages: { type: integer }
      required: [logs, total, page, limit, totalPages]
