openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Station Satcom Admin Panel API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: station
  - name: records
  - name: admin
  - name: audit
  - name: starlink
  - name: leobridge
  - name: whatsapp

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /readyz:
    get:
      operationId: readinessCheck
      tags: [health]
      summary: Readiness probe (DB + last sync + scheduler)
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/sessions:
    get:
      operationId: listSessions
      tags: [auth]
      security: [{ cookieAuth: [] }, { bearerAuth: [] }]
      responses:
        "200":
          description: Active sessions for current user
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [id, createdAt, lastSeenAt, current]
                  properties:
                    id: { type: integer }
                    ip: { type: string, nullable: true }
                    userAgent: { type: string, nullable: true }
                    createdAt: { type: string, format: date-time }
                    lastSeenAt: { type: string, format: date-time }
                    current: { type: boolean }

  /auth/sessions/{id}:
    delete:
      operationId: revokeSession
      tags: [auth]
      security: [{ cookieAuth: [] }, { bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  /auth/sessions/terminate-all:
    post:
      operationId: terminateAllSessions
      tags: [auth]
      summary: Tüm cihazlardaki oturumları sonlandır
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Sessions terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /station/accounts:
    get:
      operationId: listStationAccounts
      tags: [station]
      summary: Tüm portal hesaplarını listele
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StationAccount"
    post:
      operationId: createStationAccount
      x-required-role: admin
      tags: [station]
      summary: Yeni portal hesabı ekle
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStationAccountBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationAccount"

  /station/accounts/{id}:
    patch:
      operationId: updateStationAccount
      x-required-role: admin
      tags: [station]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStationAccountBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationAccount"
    delete:
      operationId: deleteStationAccount
      x-required-role: admin
      tags: [station]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /station/accounts/{id}/test-connection:
    post:
      operationId: testStationAccountConnection
      x-required-role: admin
      tags: [station]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestConnectionResponse"

  /station/settings:
    get:
      operationId: getStationSettings
      tags: [station]
      summary: (Legacy) İlk hesabı döner — geriye dönük uyumluluk için.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationSettings"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: saveStationSettings
      x-required-role: admin
      tags: [station]
      summary: (Legacy) İlk hesabı günceller.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveStationSettingsBody"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationSettings"

  /station/test-connection:
    post:
      operationId: testConnection
      x-required-role: admin
      tags: [station]
      summary: (Legacy) İlk hesabın bağlantısını test eder.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Connection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestConnectionResponse"

  /station/wipe-data:
    post:
      operationId: wipeStationData
      x-required-role: admin
      tags: [station]
      summary: Terminal verilerini siler. credentialId verilmezse TÜM hesapların verisi silinir.
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: credentialId
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Wipe result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WipeDataResponse"

  /station/sync-now:
    post:
      operationId: syncNow
      x-required-role: admin
      tags: [station]
      summary: Tüm aktif portal hesaplarını sırayla senkronize eder.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "409":
          description: Sync already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /station/sync-progress:
    get:
      operationId: getSyncProgress
      tags: [station]
      summary: Aktif (veya son) senkronizasyonun canlı ilerleme durumu.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Progress snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncProgress"

  # ---------------------------------------------------------------------------
  # WhatsApp eşik bildirim sistemi (Task #27)
  # ---------------------------------------------------------------------------
  /whatsapp/settings:
    get:
      operationId: getWhatsappSettings
      x-required-role: admin
      tags: [whatsapp]
      summary: WhatsApp (wpileti.com) yapılandırması.
      security: [{ cookieAuth: [] }, { bearerAuth: [] }]
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WhatsappSettings" }
    patch:
      operationId: updateWhatsappSettings
      x-required-role: admin
      tags: [whatsapp]
      security: [{ cookieAuth: [] }, { bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WhatsappSettingsUpdate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WhatsappSettings" }

  /whatsapp/test:
    post:
      operationId: testWhatsappSettings
      x-required-role: admin
      tags: [whatsapp]
      summary: Test mesajı gönderir (override alıcı veya kayıtlı testRecipient).
      security: [{ cookieAuth: [] }, { bearerAuth: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                to: { type: string, nullable: true }
      responses:
        "200":
          description: Test sonucu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WhatsappTestResult" }

  /whatsapp/threshold-rules:
    get:
      operationId: listWhatsappThresholdRules
      x-required-role: admin
      tags: [whatsapp]
      security: [{ cookieAuth: [] }, { bearerAuth: [] }]
      responses:
        "200":
          description: Plan-bazlı eşik kuralları
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WhatsappThresholdRule" }
    post:
      operationId: createWhatsappThresholdRule
      x-required-role: admin
      tags: [whatsapp]
      security: [{ cookieAuth: [] }, { bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateWhatsappThresholdRuleBody" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WhatsappThresholdRule" }

  /whatsapp/threshold-rules/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    delete:
      operationId: deleteWhatsappThresholdRule
      x-required-role: admin
      tags: [whatsapp]
      security: [{ cookieAuth: [] }, { bearerAuth: [] }]
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  /station/email-settings:
    get:
      operationId: getEmailSettings
      tags: [station]
      summary: SMTP yapılandırması ve uyarı alıcılarını döner.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Email settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailSettings"
    put:
      operationId: updateEmailSettings
      x-required-role: admin
      tags: [station]
      summary: SMTP / uyarı alıcılarını günceller.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailSettingsUpdate"
      responses:
        "200":
          description: Updated email settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailSettings"

  /station/email-settings/test:
    post:
      operationId: testEmailSettings
      x-required-role: admin
      tags: [station]
      summary: Yapılandırılmış SMTP üzerinden test maili gönderir.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                to:
                  type: string
                  description: Override recipient (CSV). Boşsa kayıtlı liste kullanılır.
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                required: [success, message]
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  recipients:
                    type: array
                    items: { type: string }

  /station/kits:
    get:
      operationId: getKits
      tags: [records]
      summary: KIT summary list (active period totals)
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [totalGib, totalUsd, lastSeen]
      responses:
        "200":
          description: KIT summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitSummary"

  /station/kits/{kitNo}/source:
    get:
      operationId: getKitSource
      tags: [records]
      summary: Resolve which data source a KIT belongs to (satcom vs starlink)
      description: |
        Authoritative classifier — checks the actual `starlink_terminals` and
        `station_kits` tables. Frontend dispatcher and customer-scope use this
        instead of guessing from the `KITP` prefix (Tototheo serials may also
        start with `KITP\d`, which would otherwise be misrouted to Satcom).
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: KIT source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KitSourceResponse"

  /station/kits/{kitNo}:
    get:
      operationId: getKitDetail
      tags: [records]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: KIT detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KitDetail"
        "404":
          description: KIT not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /station/kits/{kitNo}/daily:
    get:
      operationId: getKitDaily
      tags: [records]
      summary: Day-by-day CDR rows for a KIT in a period
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: path
          required: true
          schema: { type: string }
        - name: period
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Daily points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitDailyPoint"

  /station/kits/{kitNo}/monthly:
    get:
      operationId: getKitMonthly
      tags: [records]
      summary: Period totals for a KIT (all months)
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Monthly totals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitMonthlyPoint"

  /station/kits/{kitNo}/location:
    get:
      operationId: getKitLocation
      tags: [records]
      summary: Satcom KIT'in son bilinen konumu (Map sayfası snapshot'ı)
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Konum
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KitLocation"
        "404":
          description: KIT konum verisi yok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /station/locations:
    get:
      operationId: getKitLocations
      tags: [records]
      summary: Tüm Satcom KIT'lerinin son konumları (Map için)
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Konum listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitLocation"

  /station/kits/{kitNo}/telemetry/hourly:
    get:
      operationId: getKitTelemetryHourly
      tags: [records]
      summary: Satcom KIT için saatlik telemetri (DL/UL/Latency/PingDrop/Obstruction/Signal)
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: path
          required: true
          schema: { type: string }
        - name: days
          in: query
          description: "Geriye dönük kaç günü döndüreceğiz (varsayılan 7, max 30)."
          schema: { type: integer, minimum: 1, maximum: 30 }
      responses:
        "200":
          description: Saatlik telemetri noktaları
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitTelemetryHourlyPoint"

  /station/kits/{kitNo}/subscriptions:
    get:
      operationId: getKitSubscriptions
      tags: [records]
      summary: Satcom KIT abonelik geçmişi (CardDetails grid'i)
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Abonelik geçmişi (en yeni en üstte)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitSubscription"

  /station/summary:
    get:
      operationId: getDashboardSummary
      tags: [records]
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /starlink/settings:
    get:
      operationId: getStarlinkSettings
      tags: [starlink]
      summary: Tototheo TM Starlink API ayarlarını döner (token gizli).
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Starlink settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StarlinkSettings"
    put:
      operationId: updateStarlinkSettings
      x-required-role: admin
      tags: [starlink]
      summary: Tototheo API token / endpoint / aktif durumunu günceller.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StarlinkSettingsUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StarlinkSettings"

  /starlink/test-connection:
    post:
      operationId: testStarlinkConnection
      x-required-role: admin
      tags: [starlink]
      summary: Tototheo API bağlantısını test eder.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                apiBaseUrl: { type: string }
                token: { type: string, nullable: true }
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StarlinkTestResult"

  /starlink/sync-now:
    post:
      operationId: syncStarlinkNow
      x-required-role: admin
      tags: [starlink]
      summary: Starlink senkronizasyonunu manuel başlatır (fire-and-forget).
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "409":
          description: Already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /starlink/accounts:
    get:
      operationId: listStarlinkAccounts
      tags: [starlink]
      summary: Tüm Starlink hesaplarını listele
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StarlinkAccount"
    post:
      operationId: createStarlinkAccount
      x-required-role: admin
      tags: [starlink]
      summary: Yeni Starlink hesabı ekle
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStarlinkAccountBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StarlinkAccount"

  /starlink/accounts/{id}:
    patch:
      operationId: updateStarlinkAccount
      x-required-role: admin
      tags: [starlink]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStarlinkAccountBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StarlinkAccount"
    delete:
      operationId: deleteStarlinkAccount
      x-required-role: admin
      tags: [starlink]
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /starlink/accounts/{id}/test-connection:
    post:
