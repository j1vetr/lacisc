components:
  securitySchemes:
    # Birincil auth: tarayıcılar için httpOnly `auth_token` cookie (login
    # yanıtında Set-Cookie ile gelir) + mutation'larda `x-csrf-token` header
    # (double-submit; non-httpOnly `csrf_token` cookie'sinden echo). CLI/mobil
    # istemciler için Authorization: Bearer fallback'i de kabul edilir; bu
    # durumda CSRF kontrolü atlanır.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Cookie-first: `auth_token` httpOnly cookie. Bearer header is the
        non-browser fallback; mutations additionally require the
        `x-csrf-token` header echoed from the `csrf_token` cookie.
    cookieAuth:
      type: apiKey
      in: cookie
      name: auth_token

  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error: { type: string }
      required: [error]

    MessageResponse:
      type: object
      properties:
        message: { type: string }
      required: [message]

    LoginBody:
      type: object
      properties:
        # `email` legacy alanı (eski clientlar) ve `usernameOrEmail` (yeni
        # clientlar) — server her ikisini de kabul edip OR'lar. İkisi de
        # opsiyonel; en az biri ZORUNLU (server-side enforce).
        email: { type: string }
        usernameOrEmail: { type: string }
        password: { type: string }
      required: [password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AdminUser"
      required: [user]

    AdminUser:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, nullable: true }
        username: { type: string, nullable: true }
        role: { type: string, enum: [owner, admin, viewer, customer] }
        lastLoginAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, name, role, createdAt]

    AdminUserDetail:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, nullable: true }
        username: { type: string, nullable: true }
        phone: { type: string, nullable: true, description: "WhatsApp eşik bildirimi için E.164-without-plus (örn. 905321234567)." }
        role: { type: string, enum: [owner, admin, viewer, customer] }
        lastLoginAt: { type: string, format: date-time, nullable: true }
        lockedUntil: { type: string, format: date-time, nullable: true }
        assignedKitCount: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, role, createdAt, updatedAt]

    CreateAdminUserBody:
      type: object
      properties:
        name: { type: string }
        email: { type: string, nullable: true }
        username: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        password: { type: string }
        role: { type: string, enum: [owner, admin, viewer, customer] }
      required: [name, password]

    UpdateAdminUserBody:
      type: object
      properties:
        name: { type: string }
        username: { type: string, nullable: true }
        phone: { type: string, nullable: true, description: "undefined → değişmez, '' veya null → temizler, dolu → günceller." }
        role: { type: string, enum: [owner, admin, viewer, customer] }
        unlock: { type: boolean }

    AssignableKit:
      type: object
      properties:
        kitNo: { type: string }
        label: { type: string, nullable: true }
        source: { type: string, enum: [satcom, starlink, leobridge] }
        currentPeriodGib: { type: number, nullable: true }
      required: [kitNo, source]

    AssignableKitsResponse:
      type: object
      properties:
        kits:
          type: array
          items: { $ref: "#/components/schemas/AssignableKit" }
      required: [kits]

    KitAssignment:
      type: object
      properties:
        kitNo: { type: string }
        source: { type: string, enum: [satcom, starlink, leobridge] }
        assignedAt: { type: string, format: date-time }
        assignedByUserId: { type: integer, nullable: true }
      required: [kitNo, source, assignedAt]

    AssignedKitsResponse:
      type: object
      properties:
        assignments:
          type: array
          items: { $ref: "#/components/schemas/KitAssignment" }
      required: [assignments]

    UpdateAssignedKitsBody:
      type: object
      properties:
        kitNos:
          type: array
          items: { type: string }
      required: [kitNos]

    UpdateAssignedKitsResponse:
      type: object
      properties:
        count: { type: integer }
        added:
          type: array
          items: { type: string }
        removed:
          type: array
          items: { type: string }
      required: [count, added, removed]

    ResetPasswordBody:
      type: object
      properties:
        newPassword: { type: string }
      required: [newPassword]

    ReadinessStatus:
      type: object
      properties:
        status: { type: string }
        checks:
          type: object
          additionalProperties: true
      required: [status, checks]

    AuditLogEntry:
      type: object
      properties:
        id: { type: integer }
        actorUserId: { type: integer, nullable: true }
        actorEmail: { type: string, nullable: true }
        actorName: { type: string, nullable: true }
        action: { type: string }
        target: { type: string, nullable: true }
        meta:
          nullable: true
        ip: { type: string, nullable: true }
        userAgent: { type: string, nullable: true }
        success: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, action, success, createdAt]

    AuditLogsResponse:
      type: object
      properties:
        logs:
          type: array
          items: { $ref: "#/components/schemas/AuditLogEntry" }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        totalPages: { type: integer }
        actions:
          type: array
          items: { type: string }
      required: [logs, total, page, limit, totalPages, actions]

    ChangePasswordBody:
      type: object
      properties:
        currentPassword: { type: string }
        newPassword: { type: string }
      required: [currentPassword, newPassword]

    StationSettings:
      type: object
      properties:
        id: { type: integer }
        label: { type: string, nullable: true }
        portalUrl: { type: string }
        username: { type: string }
        isActive: { type: boolean }
        defaultBillingPeriod: { type: string, nullable: true }
        syncIntervalMinutes: { type: integer }
        lastSuccessSyncAt: { type: string, format: date-time, nullable: true }
        lastErrorMessage: { type: string, nullable: true }
        firstFullSyncAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - portalUrl
        - username
        - isActive
        - syncIntervalMinutes
        - createdAt
        - updatedAt

    StationAccount:
      type: object
      properties:
        id: { type: integer }
        label: { type: string, nullable: true }
        portalUrl: { type: string }
        username: { type: string }
        isActive: { type: boolean }
        syncIntervalMinutes: { type: integer }
        lastSuccessSyncAt: { type: string, format: date-time, nullable: true }
        lastErrorMessage: { type: string, nullable: true }
        firstFullSyncAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        kitCount: { type: integer }
      required:
        - id
        - portalUrl
        - username
        - isActive
        - syncIntervalMinutes
        - createdAt
        - updatedAt
        - kitCount

    CreateStationAccountBody:
      type: object
      properties:
        label: { type: string, nullable: true }
        portalUrl: { type: string }
        username: { type: string }
        password: { type: string }
        isActive: { type: boolean }
        syncIntervalMinutes: { type: integer }
      required: [portalUrl, username, password]

    UpdateStationAccountBody:
      type: object
      properties:
        label: { type: string, nullable: true }
        portalUrl: { type: string }
        username: { type: string }
        password: { type: string, nullable: true }
        isActive: { type: boolean }
        syncIntervalMinutes: { type: integer }

    SaveStationSettingsBody:
      type: object
      properties:
        portalUrl: { type: string }
        username: { type: string }
        password: { type: string, nullable: true }
        isActive: { type: boolean }
        defaultBillingPeriod: { type: string, nullable: true }
        syncIntervalMinutes: { type: integer }
      required: [portalUrl, username, isActive, syncIntervalMinutes]

    TestConnectionResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
      required: [success, message]

    WipeDataResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        deleted:
          type: object
          properties:
