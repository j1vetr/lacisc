openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Station Satcom Admin Panel API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: station
  - name: records
  - name: admin
  - name: audit

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /readyz:
    get:
      operationId: readinessCheck
      tags: [health]
      summary: Readiness probe (DB + last sync + scheduler)
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/sessions/terminate-all:
    post:
      operationId: terminateAllSessions
      tags: [auth]
      summary: Tüm cihazlardaki oturumları sonlandır
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sessions terminated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /station/accounts:
    get:
      operationId: listStationAccounts
      tags: [station]
      summary: Tüm portal hesaplarını listele
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StationAccount"
    post:
      operationId: createStationAccount
      tags: [station]
      summary: Yeni portal hesabı ekle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStationAccountBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationAccount"

  /station/accounts/{id}:
    patch:
      operationId: updateStationAccount
      tags: [station]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStationAccountBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationAccount"
    delete:
      operationId: deleteStationAccount
      tags: [station]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /station/accounts/{id}/test-connection:
    post:
      operationId: testStationAccountConnection
      tags: [station]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestConnectionResponse"

  /station/settings:
    get:
      operationId: getStationSettings
      tags: [station]
      summary: (Legacy) İlk hesabı döner — geriye dönük uyumluluk için.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationSettings"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: saveStationSettings
      tags: [station]
      summary: (Legacy) İlk hesabı günceller.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveStationSettingsBody"
      responses:
        "200":
          description: Settings saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationSettings"

  /station/test-connection:
    post:
      operationId: testConnection
      tags: [station]
      summary: (Legacy) İlk hesabın bağlantısını test eder.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Connection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestConnectionResponse"

  /station/wipe-data:
    post:
      operationId: wipeStationData
      tags: [station]
      summary: Terminal verilerini siler. credentialId verilmezse TÜM hesapların verisi silinir.
      security:
        - bearerAuth: []
      parameters:
        - name: credentialId
          in: query
          required: false
          schema: { type: integer }
      responses:
        "200":
          description: Wipe result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WipeDataResponse"

  /station/sync-now:
    post:
      operationId: syncNow
      tags: [station]
      summary: Tüm aktif portal hesaplarını sırayla senkronize eder.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "409":
          description: Sync already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /station/sync-progress:
    get:
      operationId: getSyncProgress
      tags: [station]
      summary: Aktif (veya son) senkronizasyonun canlı ilerleme durumu.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Progress snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncProgress"

  /station/email-settings:
    get:
      operationId: getEmailSettings
      tags: [station]
      summary: SMTP yapılandırması ve uyarı alıcılarını döner.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Email settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailSettings"
    put:
      operationId: updateEmailSettings
      tags: [station]
      summary: SMTP / uyarı alıcılarını günceller.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailSettingsUpdate"
      responses:
        "200":
          description: Updated email settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailSettings"

  /station/email-settings/test:
    post:
      operationId: testEmailSettings
      tags: [station]
      summary: Yapılandırılmış SMTP üzerinden test maili gönderir.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                to:
                  type: string
                  description: Override recipient (CSV). Boşsa kayıtlı liste kullanılır.
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                type: object
                required: [success, message]
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  recipients:
                    type: array
                    items: { type: string }

  /station/kits:
    get:
      operationId: getKits
      tags: [records]
      summary: KIT summary list (active period totals)
      security:
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [totalGib, totalUsd, lastSeen]
      responses:
        "200":
          description: KIT summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitSummary"

  /station/kits/{kitNo}:
    get:
      operationId: getKitDetail
      tags: [records]
      security:
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: KIT detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KitDetail"
        "404":
          description: KIT not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /station/kits/{kitNo}/daily:
    get:
      operationId: getKitDaily
      tags: [records]
      summary: Day-by-day CDR rows for a KIT in a period
      security:
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: path
          required: true
          schema: { type: string }
        - name: period
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Daily points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitDailyPoint"

  /station/kits/{kitNo}/monthly:
    get:
      operationId: getKitMonthly
      tags: [records]
      summary: Period totals for a KIT (all months)
      security:
        - bearerAuth: []
      parameters:
        - name: kitNo
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Monthly totals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KitMonthlyPoint"

  /station/summary:
    get:
      operationId: getDashboardSummary
      tags: [records]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: List of admin users
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AdminUserDetail" }
    post:
      operationId: createAdminUser
      tags: [admin]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAdminUserBody" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUserDetail" }

  /admin/users/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    patch:
      operationId: updateAdminUser
      tags: [admin]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateAdminUserBody" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdminUserDetail" }
    delete:
      operationId: deleteAdminUser
      tags: [admin]
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  /admin/users/{id}/reset-password:
    parameters:
      - { name: id, in: path, required: true, schema: { type: integer } }
    post:
      operationId: resetAdminUserPassword
      tags: [admin]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ResetPasswordBody" }
      responses:
        "200":
          description: Reset
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageResponse" }

  /audit-logs:
    get:
      operationId: listAuditLogs
      tags: [audit]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
        - { name: actorUserId, in: query, schema: { type: integer } }
        - { name: action, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
      responses:
        "200":
          description: Audit log page
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuditLogsResponse" }

  /station/sync-logs:
    get:
      operationId: getSyncLogs
      tags: [records]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Sync logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncLogsResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error: { type: string }
      required: [error]

    MessageResponse:
      type: object
      properties:
        message: { type: string }
      required: [message]

    LoginBody:
      type: object
      properties:
        email: { type: string, format: email }
        password: { type: string }
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token: { type: string }
        user:
          $ref: "#/components/schemas/AdminUser"
      required: [token, user]

    AdminUser:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [owner, admin, viewer] }
        lastLoginAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, name, email, role, createdAt]

    AdminUserDetail:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [owner, admin, viewer] }
        lastLoginAt: { type: string, format: date-time, nullable: true }
        lockedUntil: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, email, role, createdAt, updatedAt]

    CreateAdminUserBody:
      type: object
      properties:
        name: { type: string }
        email: { type: string, format: email }
        password: { type: string }
        role: { type: string, enum: [owner, admin, viewer] }
      required: [name, email, password]

    UpdateAdminUserBody:
      type: object
      properties:
        name: { type: string }
        role: { type: string, enum: [owner, admin, viewer] }
        unlock: { type: boolean }

    ResetPasswordBody:
      type: object
      properties:
        newPassword: { type: string }
      required: [newPassword]

    ReadinessStatus:
      type: object
      properties:
        status: { type: string }
        checks:
          type: object
          additionalProperties: true
      required: [status, checks]

    AuditLogEntry:
      type: object
      properties:
        id: { type: integer }
        actorUserId: { type: integer, nullable: true }
        actorEmail: { type: string, nullable: true }
        actorName: { type: string, nullable: true }
        action: { type: string }
        target: { type: string, nullable: true }
        meta:
          nullable: true
        ip: { type: string, nullable: true }
        userAgent: { type: string, nullable: true }
        success: { type: boolean }
        createdAt: { type: string, format: date-time }
      required: [id, action, success, createdAt]

    AuditLogsResponse:
      type: object
      properties:
        logs:
          type: array
          items: { $ref: "#/components/schemas/AuditLogEntry" }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        totalPages: { type: integer }
        actions:
          type: array
          items: { type: string }
      required: [logs, total, page, limit, totalPages, actions]

    ChangePasswordBody:
      type: object
      properties:
        currentPassword: { type: string }
        newPassword: { type: string }
      required: [currentPassword, newPassword]

    StationSettings:
      type: object
      properties:
        id: { type: integer }
        label: { type: string, nullable: true }
        portalUrl: { type: string }
        username: { type: string }
        isActive: { type: boolean }
        defaultBillingPeriod: { type: string, nullable: true }
        syncIntervalMinutes: { type: integer }
        lastSuccessSyncAt: { type: string, format: date-time, nullable: true }
        lastErrorMessage: { type: string, nullable: true }
        firstFullSyncAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required:
        - id
        - portalUrl
        - username
        - isActive
        - syncIntervalMinutes
        - createdAt
        - updatedAt

    StationAccount:
      type: object
      properties:
        id: { type: integer }
        label: { type: string, nullable: true }
        portalUrl: { type: string }
        username: { type: string }
        isActive: { type: boolean }
        syncIntervalMinutes: { type: integer }
        lastSuccessSyncAt: { type: string, format: date-time, nullable: true }
        lastErrorMessage: { type: string, nullable: true }
        firstFullSyncAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        kitCount: { type: integer }
      required:
        - id
        - portalUrl
        - username
        - isActive
        - syncIntervalMinutes
        - createdAt
        - updatedAt
        - kitCount

    CreateStationAccountBody:
      type: object
      properties:
        label: { type: string, nullable: true }
        portalUrl: { type: string }
        username: { type: string }
        password: { type: string }
        isActive: { type: boolean }
        syncIntervalMinutes: { type: integer }
      required: [portalUrl, username, password]

    UpdateStationAccountBody:
      type: object
      properties:
        label: { type: string, nullable: true }
        portalUrl: { type: string }
        username: { type: string }
        password: { type: string, nullable: true }
        isActive: { type: boolean }
        syncIntervalMinutes: { type: integer }

    SaveStationSettingsBody:
      type: object
      properties:
        portalUrl: { type: string }
        username: { type: string }
        password: { type: string, nullable: true }
        isActive: { type: boolean }
        defaultBillingPeriod: { type: string, nullable: true }
        syncIntervalMinutes: { type: integer }
      required: [portalUrl, username, isActive, syncIntervalMinutes]

    TestConnectionResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
      required: [success, message]

    WipeDataResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        deleted:
          type: object
          properties:
            kitDaily: { type: integer }
            kitPeriodTotal: { type: integer }
            kits: { type: integer }
            syncLogs: { type: integer }
          required: [kitDaily, kitPeriodTotal, kits, syncLogs]
      required: [success, message, deleted]

    SyncResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        recordsFound: { type: integer }
        recordsInserted: { type: integer }
        recordsUpdated: { type: integer }
      required: [success, message, recordsFound, recordsInserted, recordsUpdated]

    SyncEvent:
      type: object
      properties:
        ts: { type: integer, description: "Unix epoch ms" }
        level: { type: string, enum: [info, warn, error, success] }
        message: { type: string }
      required: [ts, level, message]

    AccountResult:
      type: object
      properties:
        credentialId: { type: integer }
        label: { type: string }
        success: { type: boolean }
        message: { type: string }
        recordsFound: { type: integer }
        recordsInserted: { type: integer }
        recordsUpdated: { type: integer }
      required: [credentialId, label, success, message, recordsFound, recordsInserted, recordsUpdated]

    SyncProgress:
      type: object
      properties:
        running: { type: boolean }
        startedAt: { type: integer, nullable: true }
        finishedAt: { type: integer, nullable: true }
        totalAccounts: { type: integer }
        currentAccountIndex: { type: integer }
        currentAccountId: { type: integer, nullable: true }
        currentAccountLabel: { type: string, nullable: true }
        totalPeriods: { type: integer }
        currentPeriodIndex: { type: integer }
        currentPeriod: { type: string, nullable: true }
        totalKits: { type: integer }
        currentKitIndex: { type: integer }
        currentKit: { type: string, nullable: true }
        rowsInserted: { type: integer }
        rowsUpdated: { type: integer }
        rowsFound: { type: integer }
        failures: { type: integer }
        events:
          type: array
          items:
            $ref: "#/components/schemas/SyncEvent"
        accountResults:
          type: array
          items:
            $ref: "#/components/schemas/AccountResult"
        lastMessage: { type: string, nullable: true }
      required:
        - running
        - totalAccounts
        - currentAccountIndex
        - totalPeriods
        - currentPeriodIndex
        - totalKits
        - currentKitIndex
        - rowsInserted
        - rowsUpdated
        - rowsFound
        - failures
        - events
        - accountResults

    EmailSettings:
      type: object
      required:
        - enabled
        - smtpPort
        - smtpSecure
        - hasPassword
        - fromName
        - thresholdStepGib
        - updatedAt
      properties:
        enabled: { type: boolean }
        smtpHost: { type: string, nullable: true }
        smtpPort: { type: integer }
        smtpSecure: { type: boolean }
        smtpUser: { type: string, nullable: true }
        hasPassword: { type: boolean, description: "true → kayıtlı şifre var (gerçek değer dönmez)" }
        fromEmail: { type: string, nullable: true }
        fromName: { type: string }
        alertRecipients: { type: string, nullable: true, description: "Virgülle ayrılmış e-posta listesi" }
        thresholdStepGib: { type: integer }
        updatedAt: { type: string, format: date-time }

    EmailSettingsUpdate:
      type: object
      properties:
        enabled: { type: boolean }
        smtpHost: { type: string, nullable: true }
        smtpPort: { type: integer, minimum: 1, maximum: 65535 }
        smtpSecure: { type: boolean }
        smtpUser: { type: string, nullable: true }
        smtpPassword:
          type: string
          nullable: true
          description: "undefined → değişmez, '' veya null → şifre temizlenir, dolu → yeni şifre."
        fromEmail: { type: string, nullable: true }
        fromName: { type: string }
        alertRecipients: { type: string, nullable: true }
        thresholdStepGib: { type: integer, minimum: 10, maximum: 10000 }

    KitSummary:
      type: object
      properties:
        kitNo: { type: string }
        shipName: { type: string, nullable: true }
        totalGib: { type: number, nullable: true }
        totalUsd: { type: number, nullable: true }
        rowCount: { type: integer }
        lastPeriod: { type: string, nullable: true }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
      required: [kitNo, rowCount]

    KitDetail:
      type: object
      properties:
        kitNo: { type: string }
        shipName: { type: string, nullable: true }
        currentPeriod: { type: string, nullable: true }
        totalGib: { type: number, nullable: true }
        totalUsd: { type: number, nullable: true }
        rowCount: { type: integer }
        lastSyncedAt: { type: string, format: date-time, nullable: true }
      required: [kitNo, rowCount]

    KitDailyPoint:
      type: object
      properties:
        dayDate: { type: string, description: "YYYY-MM-DD" }
        volumeGib: { type: number, nullable: true }
        chargeUsd: { type: number, nullable: true }
        service: { type: string, nullable: true }
        cdrId: { type: string }
      required: [dayDate, cdrId]

    KitMonthlyPoint:
      type: object
      properties:
        period: { type: string }
        totalGib: { type: number, nullable: true }
        totalUsd: { type: number, nullable: true }
        rowCount: { type: integer }
        scrapedAt: { type: string, format: date-time, nullable: true }
      required: [period, rowCount]

    DashboardSummary:
      type: object
      properties:
        totalKits: { type: integer }
        totalGib: { type: number }
        totalUsd: { type: number }
        activePeriod: { type: string, nullable: true }
        lastSuccessSyncAt: { type: string, format: date-time, nullable: true }
        lastSyncStatus: { type: string, nullable: true }
        lastSyncError: { type: string, nullable: true }
        lastSyncRecordsFound: { type: integer, nullable: true }
        lastSyncRecordsInserted: { type: integer, nullable: true }
        lastSyncRecordsUpdated: { type: integer, nullable: true }
      required: [totalKits, totalGib, totalUsd]

    SyncLog:
      type: object
      properties:
        id: { type: integer }
        status: { type: string }
        message: { type: string, nullable: true }
        recordsFound: { type: integer, nullable: true }
        recordsInserted: { type: integer, nullable: true }
        recordsUpdated: { type: integer, nullable: true }
        screenshotPath: { type: string, nullable: true }
        htmlSnapshotPath: { type: string, nullable: true }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
      required: [id, status, startedAt, createdAt]

    SyncLogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            $ref: "#/components/schemas/SyncLog"
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
        totalPages: { type: integer }
      required: [logs, total, page, limit, totalPages]
